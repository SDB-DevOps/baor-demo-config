# Argo Rollouts blue-green workload (replaces the old batch CronJob).
#
# Blue-green: a new version (green) is brought up at full scale alongside the
# current one (blue). The preview Service points at green for verification; on
# promote, the active Service flips to green and blue is scaled down after a
# short delay (fast rollback window). Requires the Argo Rollouts controller in
# the cluster (see docs/CD-RUNBOOK.md).
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: cicd-demo
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cicd-demo
  template:
    metadata:
      labels:
        app: cicd-demo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          # Logical image name — overlays' `images:` (rewritten by CI) set the
          # real GHCR digest. Keep the name `cicd-demo-app`.
          image: cicd-demo-app
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            # Overridden per-overlay so blue vs green is visible in /healthz.
            - name: APP_VERSION
              value: base
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
  strategy:
    blueGreen:
      activeService: cicd-demo-active     # receives production traffic
      previewService: cicd-demo-preview   # points at the new (green) version
      autoPromotionEnabled: false         # base default: manual promote (overridden in dev/test)
      scaleDownDelaySeconds: 60           # keep old version 60s after switch for quick rollback
