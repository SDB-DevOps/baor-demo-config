# Argo Rollouts workload (replaces the old batch CronJob).
#
# NOTE: this base intentionally has NO `strategy` block. The release strategy
# (blue-green OR canary) is injected by a Kustomize Component that each overlay
# selects — see manifests/components/ and docs/RELEASE-STRATEGIES.md.
# Building this base alone yields a Rollout without a strategy (never applied
# directly); every overlay pulls in exactly one strategy component.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: cicd-demo
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cicd-demo
  template:
    metadata:
      labels:
        app: cicd-demo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          # Logical image name — overlays' `images:` (rewritten by CI) set the
          # real GHCR digest. Keep the name `cicd-demo-app`.
          image: cicd-demo-app
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            # Overridden per-overlay so blue vs green is visible in /healthz.
            - name: APP_VERSION
              value: base
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
  # strategy is injected by a component (blue-green / canary) — see overlays.
