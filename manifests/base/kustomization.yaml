apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Common workload shared by every environment overlay.
# Services + release strategy come from a strategy Component (blue-green / canary).
resources:
  - rollout.yaml

# Labels applied to all resources for consistent selection / ownership.
labels:
  - pairs:
      app.kubernetes.io/part-of: cicd-demo
    includeSelectors: false
