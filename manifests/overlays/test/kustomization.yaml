apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# namePrefix omitted — see dev overlay for why (Rollout Service name refs).
namespace: baor-demo-test

resources:
- ../../base

# Release strategy for test = canary (swap to ../../components/blue-green to switch).
components:
- ../../components/canary

# CI rewrites the digest here on every push to `test`.
images:
- name: cicd-demo-app
  newName: ghcr.io/sdb-devops/baor-demo
  newTag: test

# Label the running version for visibility in /healthz (strategy-agnostic path).
patches:
- target:
    kind: Rollout
    name: cicd-demo
  patch: |
    - op: replace
      path: /spec/template/spec/containers/0/env/0/value
      value: test
