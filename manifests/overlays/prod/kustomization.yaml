apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: baor-demo-prod
namePrefix: prod-

resources:
  - ../../base

# CI rewrites the digest here after the production approval gate passes:
#   kustomize edit set image cicd-demo-app=ghcr.io/<owner>/<repo>@sha256:<digest>
images:
  - name: cicd-demo-app
    newName: ghcr.io/OWNER/baor-demo
    newTag: prod

# Production runs once a day; give it a little more headroom.
patches:
  - target:
      kind: CronJob
      name: cicd-demo
    patch: |
      - op: replace
        path: /spec/schedule
        value: "0 3 * * *"
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/resources/limits/memory
        value: 128Mi
