apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: baor-demo-dev
namePrefix: dev-

resources:
- ../../base

# CI rewrites the digest here on every push to `dev`:
#   kustomize edit set image cicd-demo-app=ghcr.io/<owner>/<repo>@sha256:<digest>
# The placeholder below is replaced automatically; keep the name `cicd-demo-app`.
images:
- digest: sha256:7378bd28fcd92d26ced3d0dd54533f67bd7e2c6915571b533a160fcf910cfe0e
  name: cicd-demo-app
  newName: ghcr.io/sdb-devops/baor-demo

# Dev runs frequently for fast feedback.
patches:
- patch: |
    - op: replace
      path: /spec/schedule
      value: "*/5 * * * *"
  target:
    kind: CronJob
    name: cicd-demo
