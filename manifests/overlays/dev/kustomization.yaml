apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: baor-demo-dev
namePrefix: dev-

resources:
  - ../../base

# CI rewrites the digest here on every push to `dev`:
#   kustomize edit set image cicd-demo-app=ghcr.io/<owner>/<repo>@sha256:<digest>
# The placeholder below is replaced automatically; keep the name `cicd-demo-app`.
images:
  - name: cicd-demo-app
    newName: ghcr.io/OWNER/baor-demo
    newTag: dev

# Dev runs frequently for fast feedback.
patches:
  - target:
      kind: CronJob
      name: cicd-demo
    patch: |
      - op: replace
        path: /spec/schedule
        value: "*/5 * * * *"
