apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# namePrefix intentionally omitted: the Rollout references its Services by name
# (strategy.blueGreen.active/previewService) and kustomize would not rewrite
# those CRD fields. Namespace isolation is enough.
namespace: baor-demo-dev

resources:
- ../../base

# Release strategy for dev = canary (swap to ../../components/blue-green to switch).
components:
- ../../components/canary

# CI rewrites the digest here on every push to `dev`:
#   kustomize edit set image cicd-demo-app=ghcr.io/<owner>/<repo>@sha256:<digest>
# Keep the name `cicd-demo-app`.
images:
- digest: sha256:869831e295c618fbd72d2f5a89d93bbd130b0fab0688fa48be306ab63dd84677
  name: cicd-demo-app
  newName: ghcr.io/sdb-devops/baor-demo

# Label the running version for visibility in /healthz (strategy-agnostic path).
patches:
- patch: |
    - op: replace
      path: /spec/template/spec/containers/0/env/0/value
      value: dev
  target:
    kind: Rollout
    name: cicd-demo
