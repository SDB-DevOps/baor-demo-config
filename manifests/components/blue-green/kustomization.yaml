apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Blue-green strategy: adds the active/preview Services and injects
# spec.strategy.blueGreen into the base Rollout. Selected by an overlay via
# `components: [../../components/blue-green]`.
resources:
  - services.yaml

patches:
  - path: strategy.yaml
    target:
      kind: Rollout
      name: cicd-demo
