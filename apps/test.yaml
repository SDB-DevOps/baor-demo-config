apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cicd-demo-test
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # TODO: point at your GitOps config repo.
    repoURL: https://github.com/OWNER/baor-demo-config.git
    targetRevision: main
    path: manifests/overlays/test
  destination:
    server: https://kubernetes.default.svc
    namespace: baor-demo-test
  # test: automated as well — the test branch already gates on integration tests.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
